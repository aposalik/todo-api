name: Deploy Todo API

on:
  push:
    branches:
      - main  # which branch should trigger deployment?

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}  # secret name for your Docker Hub username
          password: ${{ secrets.DOCKERHUB_TOKEN }}  # secret name for your Docker Hub password

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: aposalik/todo-api:latest