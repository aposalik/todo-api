<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Todo App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container { width: 100%; max-width: 640px; }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle { color: #64748b; font-size: 0.9rem; margin-bottom: 32px; }

    /* Form */
    .form-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .form-row { display: flex; gap: 10px; margin-bottom: 12px; }

    input[type="text"] {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #6366f1; }
    input[type="text"]::placeholder { color: #475569; }

    select {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px 14px;
      color: #e2e8f0;
      font-size: 0.9rem;
      outline: none;
      cursor: pointer;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }

    .btn-add {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      white-space: nowrap;
    }
    .btn-add:hover { opacity: 0.9; }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .filter-btn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 500;
    }
    .filter-btn.active {
      background: #6366f1;
      border-color: #6366f1;
      color: white;
    }

    /* Stats */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      text-align: center;
    }
    .stat-num { font-size: 1.5rem; font-weight: 700; color: #6366f1; }
    .stat-label { font-size: 0.75rem; color: #64748b; margin-top: 2px; }

    /* Todo list */
    #todo-list { display: flex; flex-direction: column; gap: 10px; }

    .todo-item {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .todo-item:hover { border-color: #475569; }
    .todo-item.completed { opacity: 0.5; }

    .todo-check {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid #475569;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, border-color 0.2s;
    }
    .todo-check.done { background: #6366f1; border-color: #6366f1; }
    .todo-check.done::after { content: '✓'; color: white; font-size: 12px; font-weight: 700; }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .todo-item.completed .todo-text { text-decoration: line-through; color: #475569; }

    .priority-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .priority-low    { background: #064e3b; color: #6ee7b7; }
    .priority-medium { background: #78350f; color: #fcd34d; }
    .priority-high   { background: #7f1d1d; color: #fca5a5; }

    .todo-actions { display: flex; gap: 6px; }

    .btn-edit {
      background: #334155;
      color: #94a3b8;
      padding: 7px 12px;
      font-size: 0.8rem;
    }
    .btn-edit:hover { background: #475569; color: #e2e8f0; }

    .btn-delete {
      background: #450a0a;
      color: #fca5a5;
      padding: 7px 12px;
      font-size: 0.8rem;
    }
    .btn-delete:hover { background: #7f1d1d; }

    /* Edit inline */
    .edit-input {
      flex: 1;
      background: #0f172a;
      border: 1px solid #6366f1;
      border-radius: 8px;
      padding: 6px 12px;
      color: #e2e8f0;
      font-size: 0.95rem;
      outline: none;
    }

    .empty {
      text-align: center;
      color: #475569;
      padding: 48px 0;
      font-size: 0.95rem;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 0.88rem;
      color: #e2e8f0;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Todos</h1>
    <p class="subtitle">Stay organized, stay productive.</p>

    <div class="stats">
      <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Total</div></div>
      <div class="stat"><div class="stat-num" id="stat-active">0</div><div class="stat-label">Active</div></div>
      <div class="stat"><div class="stat-num" id="stat-done">0</div><div class="stat-label">Done</div></div>
    </div>

    <div class="form-card">
      <div class="form-row">
        <input type="text" id="todo-input" placeholder="What needs to be done?" />
        <select id="priority-select">
          <option value="low">🟢 Low</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
        <button class="btn-add" onclick="addTodo()">Add</button>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
      <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
      <button class="filter-btn" onclick="setFilter('high', this)">🔴 High</button>
      <button class="filter-btn" onclick="setFilter('medium', this)">🟡 Medium</button>
      <button class="filter-btn" onclick="setFilter('low', this)">🟢 Low</button>
    </div>

    <div id="todo-list"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = '/todos';
    let todos = [];
    let currentFilter = 'all';

    async function fetchTodos() {
      const res = await fetch(API);
      todos = await res.json();
      render();
    }

    async function addTodo() {
      const input = document.getElementById('todo-input');
      const title = input.value.trim();
      if (!title) return;
      const priority = document.getElementById('priority-select').value;
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, priority })
      });
      const todo = await res.json();
      todos.unshift(todo);
      input.value = '';
      render();
      showToast('Todo added ✓');
    }

    async function toggleTodo(id) {
      const todo = todos.find(t => t._id === id);
      const res = await fetch(`${API}/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed: !todo.completed })
      });
      const updated = await res.json();
      todos = todos.map(t => t._id === id ? updated : t);
      render();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      todos = todos.filter(t => t._id !== id);
      render();
      showToast('Todo deleted');
    }

    function startEdit(id) {
      const todo = todos.find(t => t._id === id);
      const item = document.querySelector(`[data-id="${id}"]`);
      const textEl = item.querySelector('.todo-text');
      const actionsEl = item.querySelector('.todo-actions');

      const editInput = document.createElement('input');
      editInput.className = 'edit-input';
      editInput.value = todo.title;
      textEl.replaceWith(editInput);
      editInput.focus();

      actionsEl.innerHTML = `
        <button class="btn-add" style="padding:7px 12px;font-size:0.8rem" onclick="saveEdit('${id}', this)">Save</button>
        <button class="btn-edit" onclick="render()">Cancel</button>
      `;
    }

    async function saveEdit(id, btn) {
      const item = btn.closest('.todo-item');
      const newTitle = item.querySelector('.edit-input').value.trim();
      if (!newTitle) return;
      const res = await fetch(`${API}/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: newTitle })
      });
      const updated = await res.json();
      todos = todos.map(t => t._id === id ? updated : t);
      render();
      showToast('Todo updated ✓');
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function getFiltered() {
      if (currentFilter === 'active')    return todos.filter(t => !t.completed);
      if (currentFilter === 'completed') return todos.filter(t => t.completed);
      if (currentFilter === 'high')      return todos.filter(t => t.priority === 'high');
      if (currentFilter === 'medium')    return todos.filter(t => t.priority === 'medium');
      if (currentFilter === 'low')       return todos.filter(t => t.priority === 'low');
      return todos;
    }

    function render() {
      const list = document.getElementById('todo-list');
      const filtered = getFiltered();

      document.getElementById('stat-total').textContent  = todos.length;
      document.getElementById('stat-active').textContent = todos.filter(t => !t.completed).length;
      document.getElementById('stat-done').textContent   = todos.filter(t => t.completed).length;

      if (!filtered.length) {
        list.innerHTML = `<div class="empty"><div class="empty-icon">✅</div>No todos here.</div>`;
        return;
      }

      list.innerHTML = filtered.map(todo => `
        <div class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo._id}">
          <div class="todo-check ${todo.completed ? 'done' : ''}" onclick="toggleTodo('${todo._id}')"></div>
          <span class="todo-text">${escHtml(todo.title)}</span>
          <span class="priority-badge priority-${todo.priority || 'medium'}">${todo.priority || 'medium'}</span>
          <div class="todo-actions">
            <button class="btn-edit" onclick="startEdit('${todo._id}')">Edit</button>
            <button class="btn-delete" onclick="deleteTodo('${todo._id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    fetchTodos();
  </script>
</body>
</html>
