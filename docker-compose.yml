version: '3.8'

services:
  # Your Node.js API
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/todos
    depends_on:
      - mongodb
    volumes:
      - .:/app
      - /app/node_modules

  # MongoDB container
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db    # ← why do you think we need this volume?

volumes:
  mongodb_data: