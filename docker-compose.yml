version: '3.8'

services:
  api:
    build: .
    environment:
      - MONGO_URI=mongodb://mongodb:27017/todos
    depends_on:
      - mongodb
    volumes:
      - .:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"    # map host port 80 to container port 80
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf  # where does Nginx look for its config?
    depends_on:
      - api         # nginx should start after which service?

  # MongoDB container
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db    # ← why do you think we need this volume?

volumes:
  mongodb_data:

